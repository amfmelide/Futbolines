<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asociación Melide Futbolín</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;800&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
  :root {
    --libre: #00c853;
    --libre-dark: #009624;
    --ocupado: #f50057;
    --ocupado-dark: #bb002f;
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #1e2d45;
    --text: #e8edf5;
    --text-dim: #7a8fa8;
    --accent: #1565c0;
    --gold: #ffc107;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Barlow', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(21,101,192,0.18) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(30,45,69,0.3) 39px, rgba(30,45,69,0.3) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(30,45,69,0.3) 39px, rgba(30,45,69,0.3) 40px);
  }
  header { text-align: center; padding: 32px 20px 20px; position: relative; }
  header::after {
    content: '';
    display: block;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--gold), var(--accent), transparent);
    margin-top: 20px;
  }
  .header-icon { display: flex; justify-content: center; margin-bottom: 10px; }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 5vw, 3.6rem);
    letter-spacing: 0.06em;
    color: #fff;
    text-shadow: 0 0 40px rgba(21,101,192,0.5);
    line-height: 1;
  }
  .subtitle { font-size: 0.85rem; color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 6px; }
  .scoreboard { display: flex; justify-content: center; gap: 16px; padding: 20px 20px 0; flex-wrap: wrap; }
  .score-card {
    flex: 1; max-width: 220px; min-width: 140px; border-radius: 14px;
    padding: 18px 20px 14px; text-align: center; border: 1px solid transparent; transition: transform 0.2s;
  }
  .score-card:hover { transform: translateY(-2px); }
  .score-card.libre { background: linear-gradient(135deg, rgba(0,200,83,0.12), rgba(0,150,36,0.06)); border-color: rgba(0,200,83,0.25); }
  .score-card.ocupado { background: linear-gradient(135deg, rgba(245,0,87,0.12), rgba(187,0,47,0.06)); border-color: rgba(245,0,87,0.25); }
  .score-card.total { background: linear-gradient(135deg, rgba(21,101,192,0.15), rgba(13,71,161,0.08)); border-color: rgba(21,101,192,0.3); }
  .score-label { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; font-weight: 600; }
  .score-number { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; line-height: 1; }
  .libre .score-number { color: var(--libre); text-shadow: 0 0 20px rgba(0,200,83,0.4); }
  .ocupado .score-number { color: var(--ocupado); text-shadow: 0 0 20px rgba(245,0,87,0.4); }
  .total .score-number { color: #7cb3ff; }
  .score-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .libre .score-dot { background: var(--libre); box-shadow: 0 0 8px var(--libre); }
  .ocupado .score-dot { background: var(--ocupado); box-shadow: 0 0 8px var(--ocupado); }
  .controls-bar { display: flex; justify-content: center; gap: 10px; padding: 18px 20px 0; flex-wrap: wrap; }
  .btn-reset {
    background: linear-gradient(135deg, #1a237e, #283593); border: 1px solid rgba(100,130,255,0.3);
    color: #90caf9; font-family: 'Barlow', sans-serif; font-weight: 700; font-size: 0.8rem;
    letter-spacing: 0.1em; text-transform: uppercase; padding: 10px 22px; border-radius: 8px; cursor: pointer; transition: all 0.2s;
  }
  .btn-reset:hover { background: linear-gradient(135deg, #283593, #3949ab); border-color: rgba(100,130,255,0.6); color: #fff; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(40,53,147,0.4); }
  .search-box {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    font-family: 'Barlow', sans-serif; font-size: 0.85rem; padding: 10px 16px;
    border-radius: 8px; outline: none; width: 200px; transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text-dim); }
  .filter-bar { display: flex; justify-content: center; gap: 8px; padding: 14px 20px 0; flex-wrap: wrap; }
  .filter-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
    font-family: 'Barlow', sans-serif; font-weight: 700; font-size: 0.75rem;
    letter-spacing: 0.08em; text-transform: uppercase; padding: 7px 16px;
    border-radius: 20px; cursor: pointer; transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .filter-btn.oro.active { background: #b8860b; border-color: #ffc107; color: #fff; }
  .filter-btn.plata.active { background: #607d8b; border-color: #b0bec5; color: #fff; }
  .filter-btn.bronce.active { background: #795548; border-color: #cd7f32; color: #fff; }
  .filter-btn.rookie.active { background: #4a148c; border-color: #9c27b0; color: #fff; }
  .grid-container { padding: 20px; max-width: 1400px; margin: 0 auto; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    overflow: hidden; transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s; position: relative;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
  .card.libre { border-color: rgba(0,200,83,0.25); }
  .card.ocupado { border-color: rgba(245,0,87,0.3); box-shadow: 0 0 20px rgba(245,0,87,0.08); }
  .card.overtime { border-color: #ff6d00 !important; box-shadow: 0 0 24px rgba(255,109,0,0.4) !important; }
  .card-top { display: flex; align-items: center; gap: 10px; padding: 14px 16px 8px; }
  .card-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--text-dim); min-width: 36px; line-height: 1; }
  .card-name-input {
    background: transparent; border: none; outline: none; color: var(--text);
    font-family: 'Barlow', sans-serif; font-weight: 700; font-size: 1rem; width: 100%; cursor: text;
  }
  .card-name-input::placeholder { color: var(--text-dim); }
  .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.68rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; }
  .libre .status-badge { background: rgba(0,200,83,0.15); color: var(--libre); border: 1px solid rgba(0,200,83,0.3); }
  .ocupado .status-badge { background: rgba(245,0,87,0.15); color: var(--ocupado); border: 1px solid rgba(245,0,87,0.3); }
  .card-meta { padding: 0 16px 10px; }
  .cat-select {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
    font-family: 'Barlow', sans-serif; font-size: 0.75rem; font-weight: 600;
    padding: 5px 10px; border-radius: 8px; cursor: pointer; outline: none;
    transition: border-color 0.2s; width: 100%;
  }
  .cat-select:focus { border-color: var(--accent); }
  .cat-select.oro { border-color: #ffc107; color: #ffc107; }
  .cat-select.plata { border-color: #b0bec5; color: #b0bec5; }
  .cat-select.bronce { border-color: #cd7f32; color: #cd7f32; }
  .cat-select.rookie { border-color: #9c27b0; color: #ce93d8; }
  .card-body { padding: 0 16px 10px; }
  .toggle-btn {
    width: 100%; padding: 12px; border: none; border-radius: 10px; font-family: 'Barlow', sans-serif;
    font-weight: 800; font-size: 0.85rem; letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
  }
  .toggle-btn::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 100%); pointer-events: none; }
  .libre .toggle-btn { background: linear-gradient(135deg, var(--libre), var(--libre-dark)); color: #fff; box-shadow: 0 4px 16px rgba(0,200,83,0.3); }
  .libre .toggle-btn:hover { background: linear-gradient(135deg, #00e676, var(--libre)); box-shadow: 0 6px 24px rgba(0,200,83,0.5); transform: translateY(-1px); }
  .ocupado .toggle-btn { background: linear-gradient(135deg, var(--ocupado), var(--ocupado-dark)); color: #fff; box-shadow: 0 4px 16px rgba(245,0,87,0.3); }
  .ocupado .toggle-btn:hover { background: linear-gradient(135deg, #ff4081, var(--ocupado)); box-shadow: 0 6px 24px rgba(245,0,87,0.5); transform: translateY(-1px); }
  .toggle-btn.confirming { opacity: 0.85; animation: pulse-btn 0.5s ease-in-out infinite alternate; }
  @keyframes pulse-btn { from { transform: scale(1); } to { transform: scale(1.02); } }
  .toggle-btn:active { transform: scale(0.97) !important; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 6px 16px 14px; min-height: 36px; }
  .time-info { display: flex; flex-direction: column; gap: 2px; }
  .time-label { font-size: 0.68rem; color: var(--text-dim); }
  .time-value { font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem; color: var(--ocupado); letter-spacing: 0.08em; }
  .timer-display {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem;
    letter-spacing: 0.1em; color: var(--libre); text-align: right; transition: color 0.3s;
  }
  .timer-display.warning { color: #ff6d00; }
  .timer-display.overtime-text { color: #ff1744; animation: blink 1s step-start infinite; }
  @keyframes blink { 50% { opacity: 0.3; } }
  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 0 0 rgba(245,0,87,0.2); }
    50% { box-shadow: 0 0 0 6px rgba(245,0,87,0); }
  }
  .card.ocupado:not(.overtime) { animation: pulse-border 2.5s ease-in-out infinite; }
  .card.ocupado .card-num { color: rgba(245,0,87,0.5); }
  .card.overtime .card-num { color: rgba(255,109,0,0.7); }
  #notif-banner {
    display: none; text-align: center; padding: 10px 20px;
    background: rgba(255,109,0,0.15); border-bottom: 1px solid rgba(255,109,0,0.3);
    color: #ff6d00; font-size: 0.8rem; font-weight: 700; letter-spacing: 0.08em; cursor: pointer;
  }
  footer { text-align: center; padding: 30px 20px; color: var(--text-dim); font-size: 0.75rem; letter-spacing: 0.1em; }
  #toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 12px 24px; border-radius: 40px; font-size: 0.85rem; font-weight: 600;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1); pointer-events: none;
    white-space: nowrap; z-index: 9999; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .grid-container { padding: 12px; }
    .card-top { padding: 10px 12px 6px; gap: 6px; }
    .card-meta { padding: 0 12px 8px; }
    .card-body { padding: 0 12px 8px; }
    .card-footer { padding: 4px 12px 10px; }
    .card-name-input { font-size: 0.85rem; }
    .toggle-btn { font-size: 0.75rem; padding: 10px; }
    .timer-display { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<div id="notif-banner" onclick="requestNotifPermission()">
  🔔 Activa las notificaciones para recibir avisos a los 25 min — toca aquí
</div>

<header>
  <div class="header-icon">
    <span style="font-family: 'Permanent Marker', cursive; font-size: clamp(3.5rem, 12vw, 6rem); color: white; letter-spacing: 0.05em; line-height: 1; text-shadow: 0 0 30px rgba(21,101,192,0.4);">amf</span>
  </div>
  <h1>ASOCIACIÓN MELIDE FUTBOLÍN</h1>
  <p class="subtitle">Panel de gestión · Evento en vivo</p>
</header>

<div class="scoreboard">
  <div class="score-card libre">
    <div class="score-label"><span class="score-dot"></span>Libres</div>
    <div class="score-number" id="count-libre">30</div>
  </div>
  <div class="score-card ocupado">
    <div class="score-label"><span class="score-dot"></span>Ocupados</div>
    <div class="score-number" id="count-ocupado">0</div>
  </div>
  <div class="score-card total">
    <div class="score-label">Total mesas</div>
    <div class="score-number">30</div>
  </div>
</div>

<div class="controls-bar">
  <input class="search-box" type="text" id="search" placeholder="🔍  Buscar futbolín..." oninput="filterCards()">
  <button class="btn-reset" onclick="resetAll()">🔄 Liberar todos</button>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('todas', this)">TODAS</button>
  <button class="filter-btn oro" onclick="setFilter('oro', this)">🥇 ORO</button>
  <button class="filter-btn plata" onclick="setFilter('plata', this)">🥈 PLATA</button>
  <button class="filter-btn bronce" onclick="setFilter('bronce', this)">🥉 BRONCE</button>
  <button class="filter-btn rookie" onclick="setFilter('rookie', this)">⭐ ROOKIE</button>
  <button class="filter-btn" onclick="setFilter('sin', this)">SIN CAT.</button>
</div>

<div class="grid-container">
  <div class="grid" id="grid"></div>
</div>

<footer>Primera pulsación pide confirmación · Segunda pulsación en 3s confirma el cambio</footer>
<div id="toast"></div>

<script>
const TOTAL = 30;
const LIMIT_MS = 25 * 60 * 1000;

const state = [];
for (let i = 1; i <= TOTAL; i++) {
  state.push({ id: i, name: `Futbolín ${String(i).padStart(2,'0')}`, libre: true, time: null, cat: '', notified: false });
}

const pendingConfirm = {};
let currentFilter = 'todas';
let tickInterval = null;

function requestNotifPermission() {
  if (!('Notification' in window)) return;
  Notification.requestPermission().then(p => {
    if (p === 'granted') {
      document.getElementById('notif-banner').style.display = 'none';
      showToast('🔔 Notificaciones activadas');
    }
  });
}

function checkNotifPermission() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    document.getElementById('notif-banner').style.display = 'block';
  }
}

function sendNotif(name) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  new Notification('⏰ Tiempo agotado', {
    body: `${name} lleva más de 25 minutos ocupado`
  });
}

function pad(n) { return String(n).padStart(2, '0'); }
function timeStr(d) { return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`; }
function elapsedStr(ms) {
  const totalSec = Math.floor(ms / 1000);
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  return `${pad(m)}:${pad(s)}`;
}

function updateCounters() {
  const libres = state.filter(s => s.libre).length;
  document.getElementById('count-libre').textContent = libres;
  document.getElementById('count-ocupado').textContent = TOTAL - libres;
}

function startTick() {
  if (tickInterval) return;
  tickInterval = setInterval(() => {
    const now = Date.now();
    for (let i = 1; i <= TOTAL; i++) {
      const s = state[i - 1];
      if (s.libre || !s.time) continue;
      const elapsed = now - s.time.getTime();
      const timerEl = document.querySelector(`#card-${i} .timer-display`);
      const card = document.getElementById(`card-${i}`);
      if (!timerEl || !card) continue;
      timerEl.textContent = elapsedStr(elapsed);
      if (elapsed >= LIMIT_MS) {
        timerEl.className = 'timer-display overtime-text';
        card.classList.add('overtime');
        if (!s.notified) {
          s.notified = true;
          sendNotif(s.name);
          showToast(`⏰ ${s.name} lleva más de 25 min`);
        }
      } else if (elapsed >= LIMIT_MS - 5 * 60 * 1000) {
        timerEl.className = 'timer-display warning';
        card.classList.remove('overtime');
      } else {
        timerEl.className = 'timer-display';
        card.classList.remove('overtime');
      }
    }
  }, 1000);
}

function toggle(id) {
  const s = state[id - 1];
  const btn = document.querySelector(`#card-${id} .toggle-btn`);
  if (pendingConfirm[id]) {
    clearTimeout(pendingConfirm[id].timer);
    delete pendingConfirm[id];
    s.libre = !s.libre;
    s.time = s.libre ? null : new Date();
    s.notified = false;
    renderCard(id);
    updateCounters();
    showToast(s.libre ? `✅ ${s.name} ahora está LIBRE` : `🔴 ${s.name} OCUPADO — ${timeStr(s.time)}`);
    return;
  }
  const emoji = s.libre ? '🔴' : '✅';
  const action = s.libre ? 'OCUPADO' : 'LIBRE';
  btn.textContent = `${emoji} ¿Confirmar ${action}? (3s)`;
  btn.classList.add('confirming');
  pendingConfirm[id] = {
    timer: setTimeout(() => {
      delete pendingConfirm[id];
      renderCard(id);
    }, 3000)
  };
}

function setCategory(id, cat) {
  state[id - 1].cat = cat;
  const sel = document.querySelector(`#card-${id} .cat-select`);
  if (sel) sel.className = `cat-select ${cat}`;
  filterCards();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterCards();
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase();
  for (let i = 1; i <= TOTAL; i++) {
    const s = state[i - 1];
    const card = document.getElementById(`card-${i}`);
    const matchSearch = s.name.toLowerCase().includes(q) || String(i).includes(q);
    const matchFilter =
      currentFilter === 'todas' ||
      (currentFilter === 'sin' && s.cat === '') ||
      s.cat === currentFilter;
    card.style.display = (matchSearch && matchFilter) ? '' : 'none';
  }
}

function renderCard(id) {
  const s = state[id - 1];
  const card = document.getElementById(`card-${id}`);
  if (!card) return;
  card.className = `card ${s.libre ? 'libre' : 'ocupado'}`;
  card.querySelector('.status-badge').textContent = s.libre ? '● Libre' : '● Ocupado';
  const btn = card.querySelector('.toggle-btn');
  btn.textContent = s.libre ? '⚡ Marcar como OCUPADO' : '✓ Marcar como LIBRE';
  btn.classList.remove('confirming');
  const timeLabel = card.querySelector('.time-label');
  const timeVal = card.querySelector('.time-value');
  const timerEl = card.querySelector('.timer-display');
  if (!s.libre && s.time) {
    timeLabel.textContent = 'Inicio:';
    timeVal.textContent = timeStr(s.time);
    timerEl.textContent = '00:00';
    timerEl.className = 'timer-display';
  } else {
    timeLabel.textContent = '';
    timeVal.textContent = '';
    timerEl.textContent = '';
    timerEl.className = 'timer-display';
    card.classList.remove('overtime');
  }
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let i = 1; i <= TOTAL; i++) {
    const s = state[i - 1];
    const card = document.createElement('div');
    card.className = 'card libre';
    card.id = `card-${i}`;
    card.innerHTML = `
      <div class="card-top">
        <div class="card-num">${String(i).padStart(2,'0')}</div>
        <div style="flex:1">
          <input class="card-name-input" value="${s.name}"
            onclick="event.stopPropagation()"
            onchange="state[${i-1}].name=this.value"
            title="Haz clic para editar el nombre">
        </div>
        <div class="status-badge">● Libre</div>
      </div>
      <div class="card-meta">
        <select class="cat-select" onchange="setCategory(${i}, this.value)">
          <option value="">Sin categoría</option>
          <option value="oro">🥇 Oro</option>
          <option value="plata">🥈 Plata</option>
          <option value="bronce">🥉 Bronce</option>
          <option value="rookie">⭐ Rookie</option>
        </select>
      </div>
      <div class="card-body">
        <button class="toggle-btn" onclick="toggle(${i})">⚡ Marcar como OCUPADO</button>
      </div>
      <div class="card-footer">
        <div class="time-info">
          <span class="time-label"></span>
          <span class="time-value"></span>
        </div>
        <div class="timer-display"></div>
      </div>`;
    grid.appendChild(card);
  }
}

function resetAll() {
  if (!confirm('¿Poner todos los futbolines en LIBRE?')) return;
  state.forEach(s => { s.libre = true; s.time = null; s.notified = false; });
  Object.keys(pendingConfirm).forEach(id => {
    clearTimeout(pendingConfirm[id].timer);
    delete pendingConfirm[id];
  });
  for (let i = 1; i <= TOTAL; i++) renderCard(i);
  updateCounters();
  showToast('✅ Todos los futbolines liberados');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

buildGrid();
updateCounters();
startTick();
checkNotifPermission();
</script>
</body>
</html>
